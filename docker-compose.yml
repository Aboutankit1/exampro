version: "3.8"

services:
  mongo:
    image: mongo:7
    container_name: cbt-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: cbt-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cbt_exam_portal
      - JWT_SECRET=change_this_super_secret_key
      - JWT_EXPIRE=1d
      - JWT_REFRESH_SECRET=change_this_refresh_secret_key
      - JWT_REFRESH_EXPIRE=7d
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: cbt-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo_data:
