# Example Nginx config for deploying both frontend and backend behind one domain on a VPS.
# Place the built frontend (frontend/dist) at /var/www/cbt-exam-portal and run the
# backend as a Node process (e.g. via pm2) on port 5000.

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/cbt-exam-portal;
    index index.html;

    # Proxy API requests to the Node/Express backend
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the React SPA; never 404 on client-side route refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
